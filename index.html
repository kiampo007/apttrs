<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#40E0D0">
<title>Dulces Aromas POS</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="toast"></div>

<!-- NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" data-module="dashboard" onclick="navigateTo('dashboard')">🏠<span>Inicio</span></button>
  <button class="nav-btn" data-module="venta" onclick="navigateTo('venta')">🛒<span>Vender</span></button>
  <button class="nav-btn" data-module="productos" onclick="navigateTo('productos')">📦<span>Productos</span></button>
  <button class="nav-btn" data-module="inventario" onclick="navigateTo('inventario')">📊<span>Stock</span></button>
  <button class="nav-btn" data-module="ventas" onclick="navigateTo('ventas')">💰<span>Ventas</span></button>
  <button class="nav-btn" data-module="clientes" onclick="navigateTo('clientes')">👥<span>Clientes</span></button>
  <button class="nav-btn" data-module="deudas" onclick="navigateTo('deudas')">📝<span>Fiados</span></button>
  <button class="nav-btn" data-module="catalogo" onclick="navigateTo('catalogo')">🌸<span>Catálogo</span></button>
</nav>

<!-- MAIN -->
<main class="main">

<!-- DASHBOARD -->
<div id="mod-dashboard" class="module active">
  <div class="header"><h1>🌸 Dulces Aromas</h1><span id="header-date"></span></div>
  <div class="dash-cards">
    <div class="dash-card" onclick="navigateTo('ventas')"><div class="dash-label">Ventas Hoy</div><div class="dash-value" id="dash-ventas">$0</div></div>
    <div class="dash-card" onclick="navigateTo('inventario')"><div class="dash-label">Stock Bajo</div><div class="dash-value" id="dash-stock">0</div></div>
    <div class="dash-card" onclick="navigateTo('deudas')"><div class="dash-label">Deudas Vencidas</div><div class="dash-value" id="dash-deudas">0</div></div>
  </div>
  <div class="dash-actions">
    <button class="btn-primary" onclick="navigateTo('venta')">🛒 Nueva Venta</button>
    <button class="btn-secondary" onclick="exportarBackup()">💾 Exportar Backup</button>
    <button class="btn-secondary" onclick="document.getElementById('import-file').click()">📥 Importar Backup</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importarBackup(this)">
    <button class="btn-danger" onclick="resetApp()">🗑️ Borrar Todo</button>
  </div>
</div>

<!-- VENTA -->
<div id="mod-venta" class="module">
  <div class="header"><h1>🛒 Vender</h1></div>
  <div class="search-bar"><input type="text" id="v-buscar" placeholder="Buscar producto..." oninput="buscarProducto()"></div>
  <div class="tabs"><button class="tab active" data-cat="todos" onclick="filtrarCat('todos')">Todos</button><button class="tab" data-cat="caballero" onclick="filtrarCat('caballero')">Caballero</button><button class="tab" data-cat="dama" onclick="filtrarCat('dama')">Dama</button><button class="tab" data-cat="unisex" onclick="filtrarCat('unisex')">Unisex</button></div>
  <div id="v-productos" class="product-grid"></div>
</div>

<!-- CART PANEL -->
<div id="cart-panel" class="cart-panel">
  <div class="cart-header"><h3>🛒 Carro</h3><button onclick="toggleCart()">✕</button></div>
  <div id="cart-items"></div>
  <div class="cart-footer">
    <div class="cart-total-row">Total: <span id="cart-total">$0</span></div>
    <div class="cart-actions">
      <button class="btn-pay" onclick="pagar('efectivo')">💵 Efectivo</button>
      <button class="btn-pay" onclick="pagar('transferencia')">📱 Transferencia</button>
      <button class="btn-pay" onclick="pagar('tarjeta')">💳 Tarjeta</button>
      <button class="btn-pay btn-credito" onclick="pagar('credito')">📝 Fiado</button>
    </div>
  </div>
</div>
<button id="cart-fab" class="cart-fab" onclick="toggleCart()">🛒<span id="cart-count">0</span></button>

<!-- PRODUCTOS -->
<div id="mod-productos" class="module">
  <div class="header"><h1>📦 Productos</h1><button class="btn-primary" onclick="showModalProducto()">➕ Nuevo</button></div>
  <div class="search-bar"><input type="text" id="p-buscar" placeholder="Buscar..." oninput="filtrarProductos()"></div>
  <div id="p-lista"></div>
</div>

<!-- MODAL PRODUCTO -->
<div id="modal-producto" class="modal">
  <div class="modal-content">
    <div class="modal-header"><h3 id="modal-producto-title">Nuevo Producto</h3><button onclick="closeModal('modal-producto')">✕</button></div>
    <div class="modal-body">
      <input type="text" id="prod-nombre" placeholder="Nombre *">
      <input type="text" id="prod-marca" placeholder="Marca">
      <input type="number" id="prod-precio" placeholder="Precio *">
      <input type="number" id="prod-stock" placeholder="Stock *">
      <select id="prod-cat"><option value="caballero">Caballero</option><option value="dama">Dama</option><option value="unisex">Unisex</option></select>
      <div id="prod-foto-preview" style="display:none"><img id="prod-foto-img" src="" style="max-width:100%;border-radius:8px"></div>
      <input type="file" id="prod-foto-input" accept="image/*" style="display:none" onchange="cargarFotoProducto(this)">
      <button class="btn-secondary" onclick="document.getElementById('prod-foto-input').click()">📷 Cargar Foto</button>
    </div>
    <div class="modal-footer"><button class="btn-primary" onclick="guardarProducto()">💾 Guardar</button></div>
  </div>
</div>

<!-- INVENTARIO -->
<div id="mod-inventario" class="module">
  <div class="header"><h1>📊 Inventario</h1></div>
  <div class="tabs"><button class="tab active" data-tab="stock" onclick="switchInvTab('stock')">Stock</button><button class="tab" data-tab="mov" onclick="switchInvTab('mov')">Movimientos</button></div>
  <div class="search-bar"><input type="text" id="inv-buscar" placeholder="Buscar..." oninput="filtrarInventario()"></div>
  <div id="inv-stock-content"><div id="inv-lista"></div></div>
  <div id="inv-mov-content" style="display:none"><div id="mov-lista"></div></div>
</div>

<!-- VENTAS -->
<div id="mod-ventas" class="module">
  <div class="header"><h1>💰 Ventas</h1></div>
  <div id="ventas-lista"></div>
</div>

<!-- CLIENTES -->
<div id="mod-clientes" class="module">
  <div class="header"><h1>👥 Clientes</h1><button class="btn-primary" onclick="showModal('modal-cliente')">➕ Nuevo</button></div>
  <div id="clientes-lista"></div>
</div>

<!-- MODAL CLIENTE -->
<div id="modal-cliente" class="modal">
  <div class="modal-content">
    <div class="modal-header"><h3>Nuevo Cliente</h3><button onclick="closeModal('modal-cliente')">✕</button></div>
    <div class="modal-body">
      <input type="text" id="cli-nombre" placeholder="Nombre *">
      <input type="text" id="cli-telefono" placeholder="Teléfono">
    </div>
    <div class="modal-footer"><button class="btn-primary" onclick="guardarCliente()">💾 Guardar</button></div>
  </div>
</div>

<!-- DEUDAS -->
<div id="mod-deudas" class="module">
  <div class="header"><h1>📝 Fiados</h1></div>
  <div class="tabs"><button class="tab active" data-tab="activas" onclick="switchDeudaTab('activas')">Activas</button><button class="tab" data-tab="historial" onclick="switchDeudaTab('historial')">Historial</button></div>
  <div id="deudas-activas-content"><div id="deudas-lista"></div></div>
  <div id="deudas-historial-content" style="display:none"><div id="deudas-historial-lista"></div></div>
</div>

<!-- MODAL CREDITO -->
<div id="modal-credito" class="modal">
  <div class="modal-content">
    <div class="modal-header"><h3>📝 Fiado</h3><button onclick="closeModal('modal-credito')">✕</button></div>
    <div class="modal-body">
      <p>Total: <strong id="credito-total">$0</strong></p>
      <select id="credito-cliente"><option value="">Seleccionar cliente...</option></select>
      <label>Cuotas (1-12): <input type="number" id="credito-cuotas" value="1" min="1" max="12" onchange="actualizarCuotaPreview()"></label>
      <p id="cuota-preview"></p>
    </div>
    <div class="modal-footer"><button class="btn-primary" onclick="confirmarCredito()">✅ Confirmar Fiado</button></div>
  </div>
</div>

<!-- MODAL DETALLE -->
<div id="modal-detalle" class="modal">
  <div class="modal-content">
    <div class="modal-header"><h3>Detalle</h3><button onclick="closeModal('modal-detalle')">✕</button></div>
    <div class="modal-body" id="detalle-content"></div>
  </div>
</div>

<!-- MODAL DEUDA DETALLE -->
<div id="modal-deuda-detalle" class="modal">
  <div class="modal-content">
    <div class="modal-header"><h3>Pago de Deuda</h3><button onclick="closeModal('modal-deuda-detalle')">✕</button></div>
    <div class="modal-body">
      <p><strong>Cliente:</strong> <span id="deuda-cliente"></span></p>
      <p><strong>Total:</strong> <span id="deuda-total"></span></p>
      <p><strong>Pendiente:</strong> <span id="deuda-pendiente"></span></p>
      <p><strong>Cuotas:</strong> <span id="deuda-cuotas"></span></p>
      <p><strong>Próx. Venc:</strong> <span id="deuda-prox-venc"></span></p>
      <hr>
      <input type="number" id="deuda-pago" placeholder="Monto a pagar">
      <p id="deuda-pago-sugerido"></p>
      <select id="deuda-metodo-pago"><option value="efectivo">Efectivo</option><option value="transferencia">Transferencia</option><option value="tarjeta">Tarjeta</option></select>
      <div id="deuda-pagos-lista"></div>
    </div>
    <div class="modal-footer"><button class="btn-primary" onclick="registrarPagoDeuda()">💵 Registrar Pago</button></div>
  </div>
</div>

<!-- CATÁLOGO -->
<div id="mod-catalogo" class="module">
  <div class="header"><h1>🌸 Catálogo</h1></div>
  <div id="cat-slide-container" class="catalogo-slider">
    <div id="catalogo-pages-wrapper"></div>
  </div>
  <div class="catalogo-nav">
    <button onclick="catAnterior()">◀</button>
    <span id="cat-page-info">0 / 0</span>
    <button onclick="catSiguiente()">▶</button>
  </div>
</div>

</main>

<script src="app.js"></script>
</body>
</html>
